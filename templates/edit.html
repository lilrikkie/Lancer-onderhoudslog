<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Aanpassen</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 py-10 min-h-screen">
    <div class="max-w-md mx-auto bg-white p-10 rounded-3xl shadow-2xl">
        <h2 class="text-3xl font-black mb-8 text-gray-900 uppercase italic">Log Aanpassen</h2>
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-black text-gray-500 uppercase mb-2">Kilometerstand</label>
                <input type="number" name="km_stand" value="{{ log.km_stand }}" required class="w-full border-2 border-gray-100 p-4 rounded-2xl text-xl font-bold outline-none focus:border-red-500 transition">
            </div>
            
            <div class="grid grid-cols-1 gap-2">
                {% for name, label in [('olie','Olie'),('oliefilter','Oliefilter'),('luchtfilter','Luchtfilter'),('interieurfilter','Interieur'),('koelvloeistof','Koelvloeistof'),('remvloeistof','Remvloeistof')] %}
                <label class="flex items-center p-3 border-2 border-gray-50 rounded-2xl cursor-pointer hover:bg-gray-50 transition">
                    <input type="checkbox" name="{{ name }}" class="h-6 w-6 text-red-600" {% if log[name] %}checked{% endif %}>
                    <span class="ml-4 font-bold text-gray-700">{{ label }}</span>
                </label>
                {% endfor %}
            </div>

            <div class="flex gap-4 pt-6">
                <button type="submit" class="flex-1 bg-red-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg shadow-red-100 hover:bg-red-700 transition">Opslaan</button>
                <a href="/" class="flex-1 bg-gray-200 text-gray-700 py-4 rounded-2xl font-black uppercase text-center hover:bg-gray-300 transition">Terug</a>
            </div>
        </form>
    </div>
</body>
</html>
